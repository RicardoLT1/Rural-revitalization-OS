server:
  port: 8082

spring:
  application:
    name: xiangyun-operation-service
  config:
    import: optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3307/xiangyun_os?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:xiangyun_app}
    password: ${MYSQL_PASSWORD:Xiangyun@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 4
    table: flyway_operation_history
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:xiangyun}
    password: ${RABBITMQ_PASSWORD:XiangyunMQ@2026}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 3000

xiangyun:
  internal-auth:
    enabled: ${XIANGYUN_INTERNAL_AUTH_ENABLED:true}
    service-name: xiangyun-operation-service
    secret: ${XIANGYUN_INTERNAL_SECRET:dev-internal-secret}
    ttl-seconds: ${XIANGYUN_INTERNAL_TTL_SECONDS:60}
    clock-skew-seconds: ${XIANGYUN_INTERNAL_CLOCK_SKEW_SECONDS:5}
    allowed-services:
      - xiangyun-gateway
      - xiangyun-analysis-service
      - xiangyun-auth-service
    exclude-paths:
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
  cache:
    resource-detail-ttl-seconds: ${RESOURCE_DETAIL_CACHE_TTL_SECONDS:600}
  outbox:
    initial-delay-ms: ${OUTBOX_INITIAL_DELAY_MS:10000}
    scan-delay-ms: ${OUTBOX_SCAN_DELAY_MS:5000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

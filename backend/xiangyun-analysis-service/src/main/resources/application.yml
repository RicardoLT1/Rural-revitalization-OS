server:
  port: 8083

spring:
  application:
    name: xiangyun-analysis-service
  config:
    import: optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3307/xiangyun_os?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:xiangyun_app}
    password: ${MYSQL_PASSWORD:Xiangyun@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    table: flyway_analysis_history
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 3000

report:
  default-range-days: ${REPORT_DEFAULT_RANGE_DAYS:7}

xiangyun:
  report:
    default-range-days: ${REPORT_DEFAULT_RANGE_DAYS:7}
  risk:
    warning-threshold: ${RISK_WARNING_THRESHOLD:3}
  cache:
    dashboard-ttl-seconds: ${DASHBOARD_CACHE_TTL_SECONDS:180}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

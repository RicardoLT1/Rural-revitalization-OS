server:
  port: 8081

spring:
  application:
    name: xiangyun-auth-service
  config:
    import: optional:nacos:${spring.application.name}.yml
  cloud:
    openfeign:
      client:
        config:
          xiangyun-operation-service:
            connect-timeout: 1000
            read-timeout: 1000
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3307/xiangyun_os?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:xiangyun_app}
    password: ${MYSQL_PASSWORD:Xiangyun@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_auth_history
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

xiangyun:
  auth:
    bootstrap:
      enabled: ${AUTH_BOOTSTRAP_ENABLED:false}
      username: ${AUTH_BOOTSTRAP_USERNAME:admin}
      password: ${AUTH_BOOTSTRAP_PASSWORD:}
      display-name: ${AUTH_BOOTSTRAP_DISPLAY_NAME:系统管理员}
      village-id: ${AUTH_BOOTSTRAP_VILLAGE_ID:1}
  jwt:
    secret: ${JWT_SECRET:xiangyun-demo-secret-2026}
    ttl-seconds: ${JWT_TTL_SECONDS:7200}
  internal-auth:
    enabled: ${XIANGYUN_INTERNAL_AUTH_ENABLED:true}
    service-name: xiangyun-auth-service
    secret: ${XIANGYUN_INTERNAL_SECRET:dev-internal-secret}
    ttl-seconds: ${XIANGYUN_INTERNAL_TTL_SECONDS:60}
    clock-skew-seconds: ${XIANGYUN_INTERNAL_CLOCK_SKEW_SECONDS:5}
    allowed-services:
      - xiangyun-gateway
      - xiangyun-operation-service
    exclude-paths:
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
